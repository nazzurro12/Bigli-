name: Build temporary Bigli patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposed patch builder
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build repaired patch archive
        run: python tools/run_patch_builder.py
      - name: Upload directly extractable repaired patch
        uses: actions/upload-artifact@v4
        with:
          name: Bigliworld_reparacion_sintaxis_fase1_directo
          path: _patch_build/Bigliworld_optimizacion_fase1/
          if-no-files-found: error
          retention-days: 7
