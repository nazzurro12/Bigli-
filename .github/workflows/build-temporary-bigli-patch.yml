name: Build temporary Bigli patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposed patch builder
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build patch archive
        shell: bash
        run: |
          set +e
          python tools/run_patch_builder.py > build.log 2>&1
          code=$?
          cat build.log
          echo "$code" > build.exit
          exit 0
      - name: Publish build log in PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '### Resultado del constructor temporal\n\n```text\n' > pr-comment.md
          cat build.log >> pr-comment.md
          printf '\n```\n' >> pr-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file pr-comment.md
      - name: Upload directly extractable patch
        uses: actions/upload-artifact@v4
        with:
          name: Bigliworld_optimizacion_fase1_directo
          path: _patch_build/Bigliworld_optimizacion_fase1/
          if-no-files-found: error
          retention-days: 7
