name: Build temporary Bigli patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposed patch builder
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build patch archive
        run: python tools/build_performance_patch.py
      - name: Upload patch
        uses: actions/upload-artifact@v4
        with:
          name: Bigliworld_optimizacion_fase1
          path: dist/Bigliworld_optimizacion_fase1.zip
          if-no-files-found: error
          retention-days: 7
